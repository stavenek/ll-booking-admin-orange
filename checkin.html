<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Incheckning – Lustiga Landet</title>
  <style>
    :root {
      --bg: #f4f5f9;
      --surface: #ffffff;
      --border: #d8dce6;
      --border-strong: #b6bccd;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #4338ca;
      --primary-hover: #3730a3;
      --primary-light: #eef2ff;
      --success: #15803d;
      --success-bg: #dcfce7;
      --success-tint: #f0fdf4;
      --danger: #b91c1c;
      --danger-bg: #fee2e2;
      --warn: #b45309;
      --warn-bg: #fef3c7;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
      --shadow-md: 0 6px 16px rgba(15, 23, 42, .08);
      --shadow-lg: 0 16px 40px rgba(15, 23, 42, .15);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 999px;
      --tap: 48px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    button { font-family: inherit; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    input, select { font-family: inherit; }

    /* Stage tint */
    body.stage-prod { --stage-color: #be185d; --stage-color-strong: #831843; }
    body.stage-dev  { --stage-color: #1d4ed8; --stage-color-strong: #1e3a8a; }

    /* Header */
    .top {
      position: sticky; top: 0;
      background: linear-gradient(135deg, var(--stage-color-strong) 0%, var(--stage-color) 100%);
      color: #fff;
      padding: calc(var(--safe-top) + 14px) 24px 14px;
      box-shadow: var(--shadow-sm);
      z-index: 50;
    }
    .top-row {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      max-width: 1200px; margin: 0 auto;
    }
    .top-title {
      display: flex; align-items: baseline; gap: 12px;
      font-size: 22px; font-weight: 800; letter-spacing: -0.01em;
    }
    .stage-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      background: #fff; color: var(--stage-color);
      font-size: 12px; font-weight: 800; letter-spacing: 0.08em;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: transform 120ms ease, background 120ms ease;
    }
    .stage-badge:hover { background: #f1f5f9; }
    .stage-badge:active { transform: scale(0.96); }
    .stage-badge:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }
    .btn-logout {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: var(--radius-md);
      padding: 0 18px; height: var(--tap); min-width: 120px;
      font-size: 16px; font-weight: 700;
      cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.26); }

    /* Dev warning */
    .dev-warning {
      background: var(--warn-bg);
      color: var(--warn);
      padding: 12px 24px;
      font-weight: 700;
      text-align: center;
      border-bottom: 2px solid var(--warn);
      display: none;
    }
    body.stage-dev .dev-warning { display: block; }

    /* Login */
    .login-screen {
      min-height: calc(100vh - 80px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 60px 24px;
    }
    .login-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: min(420px, 100%);
      box-shadow: var(--shadow-md);
    }
    .login-card h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }
    .login-card p {
      margin: 0 0 20px;
      color: var(--text-muted);
      font-size: 15px;
    }
    .login-card label {
      display: block;
      font-size: 14px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .login-card input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 18px;
      min-height: var(--tap);
      background: #fff;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }
    .login-card .actions {
      margin-top: 20px;
      display: flex; gap: 12px;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 0 24px;
      height: var(--tap);
      min-width: 120px;
      font-size: 17px; font-weight: 700;
      cursor: pointer; flex: 1;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Main layout */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px calc(var(--safe-bot) + 24px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .toolbar select {
      width: 100%;
      height: var(--tap);
      padding: 0 14px;
      font-size: 17px; font-weight: 600;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14'><path fill='%2364748b' d='M3 5l4 4 4-4z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 36px;
    }
    .toolbar select:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .btn-reload {
      width: var(--tap); height: var(--tap);
      border: 2px solid var(--border); border-radius: var(--radius-md);
      background: #fff; color: var(--primary);
      font-size: 22px; font-weight: 700;
      cursor: pointer;
    }
    .btn-reload:hover { background: var(--primary-light); }
    .btn-reload.loading {
      pointer-events: none; color: transparent; position: relative;
    }
    .btn-reload.loading::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; margin: -10px 0 0 -10px;
      width: 20px; height: 20px;
      border: 3px solid var(--primary); border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stats {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 16px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: var(--radius-md);
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 16px;
    }
    .stats .big {
      font-size: 24px; font-weight: 800;
    }
    .stats .stats-spacer { flex: 1; }
    .stats label {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--text-muted); font-weight: 600;
      cursor: pointer;
    }
    .stats label input { width: 18px; height: 18px; }

    .search {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border); border-radius: var(--radius-md);
      font-size: 18px;
      min-height: var(--tap);
      background: #fff;
      margin-bottom: 12px;
    }
    .search:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    /* Bookings list */
    .bookings-list { display: flex; flex-direction: column; gap: 8px; }
    .booking-card {
      background: #ffffff;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      min-height: 60px;
    }
    .booking-card.is-checkedin {
      background: #dcfce7;
      border-color: #16a34a;
    }
    .booking-card.is-removed {
      background: #fee2e2;
      border-color: #dc2626;
    }
    .booking-card.is-removed .b-name,
    .booking-card.is-removed .b-id {
      text-decoration: line-through;
      opacity: 0.7;
    }
    .booking-card.in-flight {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .booking-card.dev-outline { outline: 2px dashed #f59e0b; outline-offset: -2px; }

    .b-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 26px; font-weight: 800;
      line-height: 1;
      background: #0f172a; color: #fff;
      padding: 6px 14px; border-radius: 10px;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .b-name {
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.01em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0; flex: 1;
    }

    .b-chips {
      display: flex; gap: 6px;
      flex-shrink: 0;
    }
    .chip {
      display: inline-flex; align-items: baseline; gap: 5px;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-size: 14px; font-weight: 600;
      border: 2px solid transparent;
      white-space: nowrap;
    }
    .chip strong { font-size: 17px; font-weight: 800; }
    .chip-kids   { background: #fed7aa; color: #c2410c; border-color: #fdba74; }
    .chip-adults { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .chip-pens   { background: #ede9fe; color: #6d28d9; border-color: #ddd6fe; }
    .chip-cars   { background: #f3f4f6; color: #4b5563; border-color: #e5e7eb; }

    .b-action {
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .pill {
      display: inline-flex; align-items: center;
      padding: 6px 12px; border-radius: var(--radius-pill);
      font-size: 13px; font-weight: 800; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pill-new       { background: var(--primary-light); color: var(--primary); }
    .pill-checkedin { background: #16a34a; color: #ffffff; }
    .pill-removed   { background: #dc2626; color: #ffffff; }

    .btn-checkin {
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 0 22px;
      height: 48px;
      min-width: 140px;
      font-size: 17px; font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .btn-checkin:hover { background: #166534; }
    .btn-checkin:active { transform: scale(0.97); }
    .btn-checkin:disabled { opacity: 0.7; cursor: wait; }
    .btn-checkin.loading { color: transparent; }
    .btn-checkin.loading::after {
      content: '';
      position: absolute; top: 50%; left: 50%; margin: -10px 0 0 -10px;
      width: 20px; height: 20px;
      border: 3px solid #fff; border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 16px;
    }

    /* Toasts */
    .toasts {
      position: fixed; top: calc(var(--safe-top) + 24px); right: 24px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 1000;
      pointer-events: none;
      max-width: min(420px, calc(100vw - 48px));
    }
    .toast {
      background: var(--text); color: #fff;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      font-size: 15px; font-weight: 600;
      box-shadow: var(--shadow-lg);
      opacity: 0; transform: translateY(-10px);
      transition: opacity 200ms ease, transform 200ms ease;
      pointer-events: auto;
      max-width: 100%;
    }
    .toast.visible { opacity: 1; transform: translateY(0); }
    .toast.toast-error { background: var(--danger); border-left: 4px solid #fff; }
    .toast.toast-success { background: var(--success); }
    .toast.toast-sticky { padding-right: 44px; position: relative; }
    .toast.toast-sticky::after {
      content: '×'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 22px; font-weight: 700; opacity: 0.8;
    }

    /* Responsive: portrait iPad and smaller */
    @media (max-width: 820px) {
      .top-row { flex-wrap: wrap; }
      .toolbar {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      .toolbar .btn-reload { grid-column: 2; grid-row: 2; justify-self: end; }
      .toolbar .stats-toggle { grid-column: 1; grid-row: 2; }
    }

    @media (max-width: 720px) {
      .booking-card { flex-wrap: wrap; }
      .b-chips { order: 3; flex-basis: 100%; }
      .b-action { margin-left: auto; }
    }
    @media (max-width: 540px) {
      .b-name { font-size: 20px; }
      .b-id { font-size: 22px; padding: 4px 10px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-row">
      <div class="top-title">
        <span>Incheckning Lustiga Landet</span>
        <button class="stage-badge" id="stageBadge" type="button" aria-label="Toggle environment">DEV</button>
      </div>
      <button class="btn-logout" id="logoutBtn" type="button" hidden>Logga ut</button>
    </div>
  </header>

  <div class="dev-warning" role="alert">
    DEV-MILJÖ — incheckningar gäller inte i kassan
  </div>

  <main class="main" id="main">
    <!-- Login or main content rendered here -->
  </main>

  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script src="checkin.js"></script>
</body>
</html>
